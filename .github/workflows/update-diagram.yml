name: Update Pipeline Diagram

on:
  push:
    branches: [master]
    paths:
      - 'config/pipeline/citeguard/**/pipeline_*.mmd'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Inject mermaid into README
        run: |
          python3 - <<'EOF'
          import re
          import yaml

          with open("config/pipeline.yml") as f:
              cfg = yaml.safe_load(f)

          version = cfg["pipeline"]["citeguard"]["version"]
          mmd_path = f"config/pipeline/citeguard/{version}/pipeline_{version}.mmd"

          with open(mmd_path) as f:
              mmd_content = f.read().strip()

          with open("README.md") as f:
              readme = f.read()

          new_block = (
              "<!-- PIPELINE_MERMAID_START -->\n"
              "```mermaid\n"
              f"{mmd_content}\n"
              "```\n"
              "<!-- PIPELINE_MERMAID_END -->"
          )

          readme = re.sub(
              r"<!-- PIPELINE_MERMAID_START -->.*?<!-- PIPELINE_MERMAID_END -->",
              new_block,
              readme,
              flags=re.DOTALL,
          )

          with open("README.md", "w") as f:
              f.write(readme)
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (
            git add README.md &&
            git commit -m "docs: update pipeline diagram [skip ci]" &&
            git push
          )
